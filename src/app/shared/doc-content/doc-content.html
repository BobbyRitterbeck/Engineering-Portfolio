@for (section of sections(); track section.title) {
  <section class="doc-section">
    <h2>{{ section.title }}</h2>
    @for (paragraph of section.paragraphs; track paragraph) {
      <p>{{ paragraph }}</p>
    }
    @if (section.list?.length) {
      <ul>
        @for (item of section.list; track item) {
          <li>{{ item }}</li>
        }
      </ul>
    }
  </section>
}
